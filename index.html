<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Workout Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .tab {
            background: #1c1c1e;
            border: none;
            color: #8e8e93;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #0a84ff;
            color: #fff;
        }
        
        .workout-select {
            margin-bottom: 20px;
        }
        
        .workout-btn {
            width: 100%;
            background: #1c1c1e;
            border: 2px solid #2c2c2e;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .workout-btn:active {
            transform: scale(0.98);
        }
        
        .workout-btn.selected {
            background: #0a84ff;
            border-color: #0a84ff;
        }
        
        .exercise-list {
            margin-top: 20px;
        }
        
        .exercise-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .exercise-card.wiggle {
            animation: wiggle 0.3s ease-in-out infinite;
        }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
        }
        
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .exercise-name-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .muscle-tag {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .muscle-tag.chest { background: #ff3b30; }
        .muscle-tag.back { background: #34c759; }
        .muscle-tag.legs { background: #5856d6; }
        .muscle-tag.shoulders { background: #ff9500; }
        .muscle-tag.arms { background: #ff9f0a; }
        .muscle-tag.core { background: #30d158; }
        
        .exercise-name {
            font-size: 17px;
            font-weight: 600;
        }
        
        .exercise-target {
            font-size: 13px;
            color: #8e8e93;
        }
        
        .sets-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .set-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 40px;
            gap: 8px;
            align-items: center;
        }
        
        .set-label {
            font-size: 15px;
            color: #8e8e93;
            font-weight: 600;
        }
        
        .set-input {
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }
        
        .set-input:focus {
            outline: 2px solid #0a84ff;
        }
        
        .check-btn {
            width: 32px;
            height: 32px;
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .check-btn.checked {
            background: #34c759;
            border-color: #34c759;
        }
        
        .check-btn.checked::after {
            content: '✓';
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        
        .set-counter-btn {
            width: 45px;
            height: 40px;
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .set-counter-btn.active {
            background: #34c759;
            border-color: #34c759;
        }
        
        .set-counter-text {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }
        
        .workout-controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .control-btn {
            flex: 1;
            background: #0a84ff;
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .control-btn.secondary {
            background: #2c2c2e;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-card {
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .history-card:active {
            transform: scale(0.98);
        }
        
        .history-card-wrapper {
            position: relative;
            margin-bottom: 12px;
        }
        
        .history-card-content {
            position: relative;
            z-index: 2;
            background: #1c1c1e;
            border-radius: 12px;
            transition: transform 0.3s ease;
            touch-action: pan-y;
        }
        
        .history-card-delete-bg {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 80px;
            background: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 1;
        }
        
        .history-card-delete-btn {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        
        .history-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2c2c2e;
        }
        
        .history-workout {
            font-size: 19px;
            font-weight: 600;
        }
        
        .history-date {
            font-size: 13px;
            color: #8e8e93;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e93;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .workout-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        
        .workout-detail-modal.active {
            display: block;
        }
        
        .workout-detail-content {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .workout-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-detail-btn {
            background: #2c2c2e;
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        
        .detail-workout-title {
            font-size: 28px;
            font-weight: 700;
        }
        
        .detail-date {
            color: #8e8e93;
            font-size: 15px;
            margin-bottom: 20px;
        }
        
        .detail-exercise-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .detail-exercise-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .detail-set-info {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2c2c2e;
            font-size: 15px;
        }
        
        .detail-set-info:last-child {
            border-bottom: none;
        }
        
        .detail-set-label {
            color: #8e8e93;
        }
        
        .detail-set-values {
            color: #fff;
            font-weight: 500;
        }
        
        /* Library specific styles */
        .library-exercise-wrapper {
            position: relative;
            margin-bottom: 12px;
        }
        
        .library-exercise-content {
            position: relative;
            z-index: 2;
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.3s ease;
            touch-action: pan-y;
        }
        
        .library-exercise-move-bg {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 80px;
            background: #0a84ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 1;
        }
        
        .library-exercise-move-btn {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        
        /* Workout selector modal */
        .workout-selector-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .workout-selector-modal.active {
            display: flex;
        }
        
        .workout-selector-content {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }
        
        .workout-selector-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .workout-selector-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .workout-selector-btn {
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .workout-selector-btn:active {
            background: #0a84ff;
        }
        
        .workout-selector-cancel {
            background: #ff3b30;
            margin-top: 10px;
        }
        
        .workout-selector-new {
            background: #0a84ff;
            margin-top: 10px;
        }
        
        .new-workout-input {
            width: 100%;
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 17px;
            margin-bottom: 10px;
        }
        
        .new-workout-input:focus {
            outline: none;
            border-color: #0a84ff;
        }
        
        .new-workout-input::placeholder {
            color: #8e8e93;
        }
        
        /* Exercise card with swipe delete in workout */
        .workout-exercise-wrapper {
            position: relative;
            margin-bottom: 12px;
        }
        
        .workout-exercise-content {
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
            touch-action: pan-y;
        }
        
        .workout-exercise-delete-bg {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 80px;
            background: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 1;
        }
        
        .workout-exercise-delete-btn {
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Body Tea 🍵</h1>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="workout">Workouts</button>
        <button class="tab" data-tab="history">History</button>
        <button class="tab" data-tab="library">Library</button>
    </div>
    
    <div id="workout-tab" class="tab-content">
        <div id="workout-select" class="workout-select">
            <button class="workout-btn" data-workout="upper">Upper</button>
            <button class="workout-btn" data-workout="lower">Lower</button>
            <button class="workout-btn" data-workout="push">Push</button>
            <button class="workout-btn" data-workout="pull">Pull</button>
            <button class="workout-btn" data-workout="legs">Legs</button>
        </div>
        
        <div id="active-workout" style="display: none;">
            <div id="exercise-list" class="exercise-list"></div>
            <div class="workout-controls">
                <button class="control-btn" onclick="finishWorkout()">Finish Workout</button>
                <button class="control-btn secondary" onclick="cancelWorkout()">Cancel</button>
            </div>
        </div>
    </div>
    
    <div id="library-tab" class="tab-content" style="display: none;">
        <div id="library-list" class="exercise-list"></div>
    </div>
    
    <div id="history-tab" class="tab-content" style="display: none;">
        <div id="history-list" class="history-list"></div>
    </div>
    
    <div id="workout-detail-modal" class="workout-detail-modal">
        <div class="workout-detail-content">
            <div class="workout-detail-header">
                <div>
                    <div class="detail-workout-title" id="detail-title"></div>
                    <div class="detail-date" id="detail-date"></div>
                </div>
                <button class="close-detail-btn" id="close-detail">✕</button>
            </div>
            <div id="detail-exercises"></div>
        </div>
    </div>
    
    <div id="workout-selector-modal" class="workout-selector-modal">
        <div class="workout-selector-content">
            <div class="workout-selector-title">Add to Workout</div>
            <div class="workout-selector-list" id="workout-selector-list"></div>
            <button class="workout-selector-btn workout-selector-cancel" onclick="closeWorkoutSelector()">Cancel</button>
        </div>
    </div>

            { name: 'Romanian Deadlift', sets: 3, reps: '8', muscle: 'back', muscleLabel: 'CMP Hamstrings', repRange: [5,15], weights: [115,135,155,185,205,225] },
            
            // Core
            { name: 'Crunch Machine', sets: 3, reps: '10', muscle: 'core', muscleLabel: 'ISO Abs', repRange: [5,15], weights: [45,60,75,90,105] },
            { name: 'Dragonfly Variation', sets: 3, reps: '15', muscle: 'core', muscleLabel: 'ISO Abs', repRange: [5,15], weights: [0] },
            { name: 'Oblique Twist', sets: 3, reps: '15', muscle: 'core', muscleLabel: 'ISO Obliques', repRange: [5,15], weights: [25,35,40,50,55,60] },
            
            // Legs - Glutes
            { name: 'Hip Thrust', sets: 3, reps: '10', muscle: 'legs', muscleLabel: 'ISO Glutes', legOrder: 1, repRange: [5,15], weights: [115,135,155,185,205,225] },
            { name: 'Hip Abduction', sets: 2, reps: '15', muscle: 'legs', muscleLabel: 'ISO Glutes', legOrder: 1, repRange: [5,15], weights: [45,60,75,90,105] },
            { name: 'Glute Toe Taps', sets: 3, reps: '15', muscle: 'legs', muscleLabel: 'ISO Glutes', legOrder: 1, repRange: [5,15], weights: [0] },
            { name: 'Bulgarian Split Squat', sets: 3, reps: '10', muscle: 'legs', muscleLabel: 'CMP Glutes', legOrder: 1, repRange: [5,15], weights: [25,35,40,50,55,60] },
            
            // Legs - Quads
            { name: 'Squat', sets: 3, reps: '10', muscle: 'legs', muscleLabel: 'CMP Quads', legOrder: 2, repRange: [5,15], weights: [115,135,155,185,205,225] },
            { name: 'Leg Extensions', sets: 3, reps: '15', muscle: 'legs', muscleLabel: 'ISO Quads', legOrder: 2, repRange: [5,15], weights: [45,60,75,90,105] },
            { name: 'Walking Lunges', sets: 3, reps: '12', muscle: 'legs', muscleLabel: 'CMP Quads', legOrder: 2, repRange: [5,15], weights: [25,35,40,50,55,60] },
            
            // Legs - Hamstrings
            { name: 'Seated Leg Curl', sets: 3, reps: '10', muscle: 'legs', muscleLabel: 'ISO Hamstrings', legOrder: 3, repRange: [5,15], weights: [45,60,75,90,105] },
            { name: 'Hip Adduction', sets: 2, reps: '15', muscle: 'legs', muscleLabel: 'ISO Inner Thighs', legOrder: 3, repRange: [5,15], weights: [45,60,75,90,105] },
            
            // Legs - Calves
            { name: 'Calf Raises', sets: 4, reps: '15', muscle: 'legs', muscleLabel: 'ISO Calves', legOrder: 4, repRange: [10,20], weights: [45,60,75,90,105] }
        ];

        let currentWorkout = null;
        let workoutData = {};
        let isReorderMode = false;
        let draggedElement = null;
        let selectedExerciseForMove = null;
        let showingNewWorkoutInput = false;

        // Load workouts and library from localStorage on startup
        function loadWorkoutsFromStorage() {
            const savedWorkouts = localStorage.getItem('workouts');
            const savedLibrary = localStorage.getItem('exerciseLibrary');
            
            if (savedWorkouts) {
                try {
                    const parsed = JSON.parse(savedWorkouts);
                    Object.assign(workouts, parsed);
                } catch (e) {
                    console.error('Error loading workouts:', e);
                }
            }
            
            if (savedLibrary) {
                try {
                    const parsed = JSON.parse(savedLibrary);
                    exerciseLibrary.length = 0;
                    exerciseLibrary.push(...parsed);
                } catch (e) {
                    console.error('Error loading library:', e);
                }
            }
        }

        // Save workouts to localStorage
        function saveWorkoutsToStorage() {
            try {
                localStorage.setItem('workouts', JSON.stringify(workouts));
            } catch (e) {
                console.error('Error saving workouts:', e);
            }
        }

        // Save library to localStorage
        function saveLibraryToStorage() {
            try {
                localStorage.setItem('exerciseLibrary', JSON.stringify(exerciseLibrary));
            } catch (e) {
                console.error('Error saving library:', e);
            }
        }

        // Load data on startup
        loadWorkoutsFromStorage();

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`${tabName}-tab`).style.display = 'block';
                
                if (tabName === 'history') {
                    loadHistory();
                } else if (tabName === 'library') {
                    loadLibrary();
                }
            });
        });

        // Workout selection
        document.querySelectorAll('.workout-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const workoutKey = btn.dataset.workout;
                startWorkout(workoutKey);
            });
        });

        function startWorkout(workoutKey) {
            currentWorkout = workoutKey;
            workoutData = {};
            isReorderMode = false;
            
            document.getElementById('workout-select').style.display = 'none';
            document.getElementById('active-workout').style.display = 'block';
            
            renderExercises();
        }

        function renderExercises() {
            const workout = workouts[currentWorkout];
            const container = document.getElementById('exercise-list');
            container.innerHTML = '';
            
            workout.exercises.forEach((exercise, exerciseIndex) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'workout-exercise-wrapper';
                wrapper.dataset.index = exerciseIndex;
                
                const deleteBg = document.createElement('div');
                deleteBg.className = 'workout-exercise-delete-bg';
                deleteBg.innerHTML = '<div class="workout-exercise-delete-btn">🗑️</div>';
                
                const content = document.createElement('div');
                content.className = 'workout-exercise-content';
                
                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.dataset.index = exerciseIndex;
                
                const header = document.createElement('div');
                header.className = 'exercise-header';
                header.innerHTML = `
                    <div class="exercise-name-container">
                        <div>
                            <div class="exercise-name">${exercise.name}</div>
                        </div>
                    </div>
                    <span class="muscle-tag ${exercise.muscle}" style="font-size: 9px; padding: 3px 6px;">${exercise.muscleLabel}</span>
                `;
                card.appendChild(header);
                
                const setsContainer = document.createElement('div');
                setsContainer.className = 'sets-container';
                
                // Single row for reps and weight selection
                const setRow = document.createElement('div');
                setRow.className = 'set-row';
                setRow.style.gridTemplateColumns = '1fr auto 1fr auto';
                setRow.style.alignItems = 'center';
                setRow.style.gap = '8px';
                
                // Generate rep options based on exercise repRange
                let repsOptions = '<option value="">-</option>';
                const [minRep, maxRep] = exercise.repRange || [5, 15];
                for (let r = minRep; r <= maxRep; r++) {
                    repsOptions += `<option value="${r}">${r}</option>`;
                }
                
                // Generate weight options based on exercise weights array
                let weightOptions = '<option value="">-</option>';
                const weights = exercise.weights || [25,35,40,50,55,60];
                weights.forEach(w => {
                    if (w === 0) {
                        weightOptions += `<option value="0">BW</option>`;
                    } else {
                        weightOptions += `<option value="${w}">${w}</option>`;
                    }
                });
                
                setRow.innerHTML = `
                    <select class="set-input" data-exercise="${exerciseIndex}" data-type="reps">${repsOptions}</select>
                    <div style="font-size: 15px; color: #fff; font-weight: 500;">at</div>
                    <select class="set-input" data-exercise="${exerciseIndex}" data-type="weight">${weightOptions}</select>
                    <button class="set-counter-btn" data-exercise="${exerciseIndex}">
                        <span class="set-counter-text">0</span>
                    </button>
                `;
                
                setsContainer.appendChild(setRow);
                
                card.appendChild(setsContainer);
                content.appendChild(card);
                wrapper.appendChild(deleteBg);
                wrapper.appendChild(content);
                container.appendChild(wrapper);
                
                // Long press for reorder mode
                let pressTimer;
                card.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        enterReorderMode();
                    }, 500);
                });
                
                card.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });
                
                card.addEventListener('touchmove', () => {
                    clearTimeout(pressTimer);
                });
                
                // Swipe to delete
                let startX = 0;
                let currentX = 0;
                let isDragging = false;
                
                content.addEventListener('touchstart', (e) => {
                    if (isReorderMode) return;
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    content.style.transition = 'none';
                });
                
                content.addEventListener('touchmove', (e) => {
                    if (!isDragging || isReorderMode) return;
                    currentX = e.touches[0].clientX;
                    const diff = currentX - startX;
                    
                    if (diff < 0 && Math.abs(diff) <= 80) {
                        content.style.transform = `translateX(${diff}px)`;
                    }
                });
                
                content.addEventListener('touchend', () => {
                    if (!isDragging || isReorderMode) return;
                    isDragging = false;
                    const diff = currentX - startX;
                    content.style.transition = 'transform 0.3s ease';
                    
                    if (Math.abs(diff) > 40) {
                        content.style.transform = 'translateX(-80px)';
                    } else {
                        content.style.transform = 'translateX(0)';
                    }
                });
                
                // Delete button
                deleteBg.addEventListener('click', () => {
                    removeExerciseFromWorkout(exerciseIndex);
                });
            });
            
            // Add event listeners for inputs
            document.querySelectorAll('.set-input').forEach(input => {
                input.addEventListener('change', handleSetInput);
            });
            
            // Add event listeners for set counter buttons
            document.querySelectorAll('.set-counter-btn').forEach(btn => {
                btn.addEventListener('click', handleSetCounter);
            });
        }
        
        function handleSetCounter(e) {
            const btn = e.currentTarget;
            const exerciseIndex = btn.dataset.exercise;
            
            // Initialize set count if not exists
            if (!workoutData[exerciseIndex]) {
                workoutData[exerciseIndex] = {};
            }
            if (!workoutData[exerciseIndex].completedSets) {
                workoutData[exerciseIndex].completedSets = 0;
            }
            
            // Increment set count
            workoutData[exerciseIndex].completedSets++;
            
            const completedSets = workoutData[exerciseIndex].completedSets;
            
            // Update button display
            btn.querySelector('.set-counter-text').textContent = completedSets;
            
            // Toggle active class
            if (completedSets > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function enterReorderMode() {
            isReorderMode = true;
            const cards = document.querySelectorAll('.exercise-card');
            cards.forEach(card => {
                card.classList.add('wiggle');
            });
            
            // Enable drag and drop
            const container = document.getElementById('exercise-list');
            container.style.cursor = 'move';
            
            // Make exercises draggable
            const wrappers = document.querySelectorAll('.workout-exercise-wrapper');
            wrappers.forEach(wrapper => {
                wrapper.draggable = true;
                
                wrapper.addEventListener('dragstart', (e) => {
                    draggedElement = wrapper;
                    wrapper.style.opacity = '0.5';
                });
                
                wrapper.addEventListener('dragend', (e) => {
                    wrapper.style.opacity = '1';
                });
                
                wrapper.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const afterElement = getDragAfterElement(container, e.clientY);
                    if (afterElement == null) {
                        container.appendChild(draggedElement);
                    } else {
                        container.insertBefore(draggedElement, afterElement);
                    }
                });
            });
            
            // Exit reorder mode on tap outside
            setTimeout(() => {
                document.addEventListener('click', exitReorderMode, { once: true });
            }, 100);
        }

        function exitReorderMode() {
            isReorderMode = false;
            const cards = document.querySelectorAll('.exercise-card');
            cards.forEach(card => {
                card.classList.remove('wiggle');
            });
            
            // Save new order
            const wrappers = document.querySelectorAll('.workout-exercise-wrapper');
            const newOrder = [];
            wrappers.forEach(wrapper => {
                const index = parseInt(wrapper.dataset.index);
                newOrder.push(workouts[currentWorkout].exercises[index]);
            });
            workouts[currentWorkout].exercises = newOrder;
            
            saveWorkoutsToStorage();
            renderExercises();
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.workout-exercise-wrapper:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function removeExerciseFromWorkout(index) {
            const exercise = workouts[currentWorkout].exercises[index];
            
            // Only add to library if it doesn't already exist
            const existsInLibrary = exerciseLibrary.some(ex => ex.name === exercise.name);
            if (!existsInLibrary) {
                exerciseLibrary.push(exercise);
                sortExerciseLibrary();
                saveLibraryToStorage();
            }
            
            workouts[currentWorkout].exercises.splice(index, 1);
            saveWorkoutsToStorage();
            renderExercises();
        }
        
        function sortExerciseLibrary() {
            const order = ['shoulders', 'chest', 'arms', 'back', 'core', 'legs'];
            exerciseLibrary.sort((a, b) => {
                const orderA = order.indexOf(a.muscle);
                const orderB = order.indexOf(b.muscle);
                
                if (orderA !== orderB) {
                    return orderA - orderB;
                }
                
                // If both are legs, sort by legOrder
                if (a.muscle === 'legs' && b.muscle === 'legs') {
                    return (a.legOrder || 0) - (b.legOrder || 0);
                }
                
                return 0;
            });
        }

        function loadLibrary() {
            const container = document.getElementById('library-list');
            container.innerHTML = '';
            
            if (exerciseLibrary.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div>Exercise library is empty.</div>
                    </div>
                `;
                return;
            }
            
            exerciseLibrary.forEach((exercise, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'library-exercise-wrapper';
                
                const moveBg = document.createElement('div');
                moveBg.className = 'library-exercise-move-bg';
                moveBg.innerHTML = '<div class="library-exercise-move-btn">➕</div>';
                
                const content = document.createElement('div');
                content.className = 'library-exercise-content';
                content.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                        <div style="font-size: 17px; font-weight: 600;">${exercise.name}</div>
                        <span class="muscle-tag ${exercise.muscle}" style="font-size: 9px; padding: 3px 6px;">${exercise.muscleLabel}</span>
                    </div>
                `;
                
                wrapper.appendChild(moveBg);
                wrapper.appendChild(content);
                container.appendChild(wrapper);
                
                // Swipe right to add to workout
                let startX = 0;
                let currentX = 0;
                let isDragging = false;
                
                content.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    content.style.transition = 'none';
                });
                
                content.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    const diff = currentX - startX;
                    
                    if (diff > 0 && diff <= 80) {
                        content.style.transform = `translateX(${diff}px)`;
                    }
                });
                
                content.addEventListener('touchend', () => {
                    if (!isDragging) return;
                    isDragging = false;
                    const diff = currentX - startX;
                    content.style.transition = 'transform 0.3s ease';
                    
                    if (diff > 40) {
                        content.style.transform = 'translateX(80px)';
                    } else {
                        content.style.transform = 'translateX(0)';
                    }
                });
                
                // Add button click
                moveBg.addEventListener('click', () => {
                    selectedExerciseForMove = index;
                    showWorkoutSelector();
                });
            });
        }

        function showWorkoutSelector() {
            const modal = document.getElementById('workout-selector-modal');
            const list = document.getElementById('workout-selector-list');
            list.innerHTML = '';
            showingNewWorkoutInput = false;
            
            // Add existing workouts
            Object.keys(workouts).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'workout-selector-btn';
                btn.textContent = workouts[key].name;
                btn.onclick = () => addExerciseToWorkout(key);
                list.appendChild(btn);
            });
            
            // Add "+ New Workout" button
            const newWorkoutBtn = document.createElement('button');
            newWorkoutBtn.className = 'workout-selector-btn workout-selector-new';
            newWorkoutBtn.textContent = '+ New Workout';
            newWorkoutBtn.onclick = showNewWorkoutInput;
            list.appendChild(newWorkoutBtn);
            
            modal.classList.add('active');
        }
        
        function showNewWorkoutInput() {
            if (showingNewWorkoutInput) return;
            showingNewWorkoutInput = true;
            
            const list = document.getElementById('workout-selector-list');
            
            // Create input field
            const inputContainer = document.createElement('div');
            inputContainer.style.marginTop = '10px';
            inputContainer.innerHTML = `
                <input type="text" class="new-workout-input" id="new-workout-name" placeholder="Workout name..." />
                <button class="workout-selector-btn workout-selector-new" onclick="createNewWorkout()">Create</button>
            `;
            
            list.appendChild(inputContainer);
            
            // Focus input
            setTimeout(() => {
                document.getElementById('new-workout-name').focus();
            }, 100);
        }
        
        function createNewWorkout() {
            const nameInput = document.getElementById('new-workout-name');
            const workoutName = nameInput.value.trim();
            
            if (!workoutName) {
                alert('Please enter a workout name');
                return;
            }
            
            // Create new workout key (lowercase, no spaces)
            const workoutKey = workoutName.toLowerCase().replace(/\s+/g, '_');
            
            // Check if workout already exists
            if (workouts[workoutKey]) {
                alert('A workout with this name already exists');
                return;
            }
            
            // Get the selected exercise
            const exercise = {...exerciseLibrary[selectedExerciseForMove]};
            
            // Create new workout
            workouts[workoutKey] = {
                name: workoutName,
                exercises: [exercise]
            };
            
            saveWorkoutsToStorage();
            
            closeWorkoutSelector();
            
            // Refresh workout buttons
            refreshWorkoutButtons();
            
            alert(`Workout "${workoutName}" created!`);
        }
        
        function refreshWorkoutButtons() {
            const container = document.getElementById('workout-select');
            container.innerHTML = '';
            
            Object.keys(workouts).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'workout-btn';
                btn.dataset.workout = key;
                btn.textContent = workouts[key].name;
                btn.addEventListener('click', () => {
                    startWorkout(key);
                });
                container.appendChild(btn);
            });
        }

        function closeWorkoutSelector() {
            document.getElementById('workout-selector-modal').classList.remove('active');
            selectedExerciseForMove = null;
        }

        function addExerciseToWorkout(workoutKey) {
            const exercise = {...exerciseLibrary[selectedExerciseForMove]}; // Clone the exercise
            workouts[workoutKey].exercises.push(exercise);
            saveWorkoutsToStorage();
            // Don't remove from library - allow duplicates
            closeWorkoutSelector();
            loadLibrary();
        }

        function handleSetInput(e) {
            const exerciseIndex = e.target.dataset.exercise;
            const type = e.target.dataset.type;
            const value = e.target.value;
            
            if (!workoutData[exerciseIndex]) {
                workoutData[exerciseIndex] = {};
            }
            
            workoutData[exerciseIndex][type] = value;
        }

        function finishWorkout() {
            const workout = workouts[currentWorkout];
            
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            history.unshift({
                workout: workout.name,
                date: new Date().toISOString(),
                data: workoutData,
                exercises: workout.exercises
            });
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            
            resetWorkout();
            alert('Workout saved! 💪');
        }

        function cancelWorkout() {
            resetWorkout();
        }
        
        window.cancelWorkout = cancelWorkout;
        window.finishWorkout = finishWorkout;
        window.closeWorkoutSelector = closeWorkoutSelector;
        window.createNewWorkout = createNewWorkout;

        function resetWorkout() {
            document.getElementById('workout-select').style.display = 'block';
            document.getElementById('active-workout').style.display = 'none';
            currentWorkout = null;
            workoutData = {};
            isReorderMode = false;
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const container = document.getElementById('history-list');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No workout history yet.<br>Complete your first workout to see it here!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            history.forEach((entry, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'history-card-wrapper';
                
                const date = new Date(entry.date);
                
                wrapper.innerHTML = `
                    <div class="history-card-delete-bg">
                        <div class="history-card-delete-btn">🗑️</div>
                    </div>
                    <div class="history-card-content" data-index="${index}">
                        <div class="history-card">
                            <div class="history-header">
                                <div>
                                    <div class="history-workout">${entry.workout}</div>
                                    <div class="history-date">${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                const cardContent = wrapper.querySelector('.history-card-content');
                const deleteBtn = wrapper.querySelector('.history-card-delete-btn');
                
                let startX = 0;
                let currentX = 0;
                let isDragging = false;
                
                cardContent.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    cardContent.style.transition = 'none';
                });
                
                cardContent.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    const diff = startX - currentX;
                    
                    if (diff > 0 && diff <= 80) {
                        cardContent.style.transform = `translateX(-${diff}px)`;
                    }
                });
                
                cardContent.addEventListener('touchend', () => {
                    isDragging = false;
                    const diff = startX - currentX;
                    cardContent.style.transition = 'transform 0.3s ease';
                    
                    if (diff > 40) {
                        cardContent.style.transform = 'translateX(-80px)';
                    } else {
                        cardContent.style.transform = 'translateX(0)';
                    }
                });
                
                cardContent.addEventListener('click', (e) => {
                    const transform = cardContent.style.transform;
                    if (transform && transform.includes('-80px')) {
                        cardContent.style.transform = 'translateX(0)';
                    } else {
                        showWorkoutDetail(entry);
                    }
                });
                
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteWorkout(index);
                });
                
                container.appendChild(wrapper);
            });
        }
        
        function showWorkoutDetail(entry) {
            const modal = document.getElementById('workout-detail-modal');
            const date = new Date(entry.date);
            
            document.getElementById('detail-title').textContent = entry.workout;
            document.getElementById('detail-date').textContent = 
                `${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            
            const exercisesContainer = document.getElementById('detail-exercises');
            exercisesContainer.innerHTML = '';
            
            entry.exercises.forEach((exercise, exerciseIndex) => {
                const exerciseCard = document.createElement('div');
                exerciseCard.className = 'detail-exercise-card';
                
                const exerciseData = entry.data[exerciseIndex] || {};
                
                if (exerciseData.reps || exerciseData.weight || exerciseData.completedSets) {
                    const reps = exerciseData.reps || '-';
                    const weight = exerciseData.weight === '0' ? 'BW' : (exerciseData.weight || '-');
                    const completedSets = exerciseData.completedSets || 0;
                    
                    exerciseCard.innerHTML = `
                        <div class="detail-exercise-name">${exercise.name}</div>
                        <div class="detail-set-info">
                            <div class="detail-set-label">${completedSets} sets</div>
                            <div class="detail-set-values">${reps} reps × ${weight}${weight !== 'BW' && weight !== '-' ? ' lbs' : ''}</div>
                        </div>
                    `;
                    exercisesContainer.appendChild(exerciseCard);
                }
            });
            
            modal.classList.add('active');
        }
        
        document.getElementById('close-detail').addEventListener('click', () => {
            document.getElementById('workout-detail-modal').classList.remove('active');
        });
        
        function deleteWorkout(index) {
            if (confirm('Delete this workout?')) {
                const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
                history.splice(index, 1);
                localStorage.setItem('workoutHistory', JSON.stringify(history));
                loadHistory();
            }
        }
    </script>
</body>
</html>
